<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to SemantixMind</title>
    
    <!-- Google Fonts for a calm, professional style -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Roboto', sans-serif; /* Clean, modern sans-serif for body */
            background-color: #000;
            color: #fff;
            overflow: hidden;
            background-image: radial-gradient(circle, rgba(20,20,50,1) 0%, rgba(10,10,30,1) 100%);
            background-size: cover;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            position: relative;
            text-align: center;
            padding: 20px;
        }

        .welcome-text {
            font-family: 'Playfair Display', serif; /* Elegant serif for headings */
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
            animation: fadeIn 2.5s ease-in-out;
            color: #e0f7fa; /* Softer cyan for a calming effect */
            text-shadow: 0 0 15px rgba(224, 247, 250, 0.5);
            margin-bottom: 20px;
        }

        .sub-text {
            font-family: 'Roboto', sans-serif;
            font-size: 1.5rem;
            font-weight: 300;
            color: #b2ebf2; /* Light cyan for readability and calm */
            text-decoration: none;
            display: inline-block;
            opacity: 0;
            animation: fadeInUp 2s ease-out 0.5s forwards;
            text-shadow: 0 0 10px rgba(178, 235, 242, 0.4);
            transition: all 0.4s ease-in-out;
            padding: 12px 24px;
            border: 1px solid rgba(178, 235, 242, 0.3);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.05); /* Subtle glassmorphism effect */
        }

        .sub-text:hover {
            color: #fff;
            text-shadow: 0 0 15px rgba(178, 235, 242, 0.8);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(178, 235, 242, 0.6);
            transform: translateY(-3px);
        }

        /* Subtle breathing animation for a calming effect */
        .pulse-circle {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(178, 235, 242, 0.2), transparent);
            border-radius: 50%;
            animation: breathe 8s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes fadeInUp {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* Shooting star effect toned down for subtlety */
        .shooting-star {
            position: absolute;
            top: -50px;
            left: -50px;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 40px 20px rgba(255, 255, 255, 0.3);
            animation: shootingStar 5s linear infinite;
        }

        @keyframes shootingStar {
            0% { transform: translate(0, 0); opacity: 0.8; }
            100% { transform: translate(90vw, 90vh); opacity: 0; }
        }

        /* Gradient overlay for depth */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(20, 20, 50, 0.2), rgba(10, 10, 30, 0.4));
            pointer-events: none;
            z-index: -2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="overlay"></div>
        <div class="pulse-circle"></div>
        <div class="shooting-star"></div>
        <h1 class="welcome-text">Welcome to SemantixMind</h1>
        <a href="AI bot.html" target="_blank" class="sub-text">Begin Your Journey</a>
    </div>
</body>
</html>
